services:
  postgres:
    image: postgres:${KOLLYWOOD_POSTGRES_IMAGE_TAG:-16}
    container_name: ${KOLLYWOOD_POSTGRES_CONTAINER_NAME:-kollywood-postgres}
    restart: unless-stopped
    ports:
      - "${KOLLYWOOD_POSTGRES_PORT:-5432}:5432"
    environment:
      POSTGRES_DB: ${KOLLYWOOD_POSTGRES_DB:-kollywood_prod}
      POSTGRES_USER: ${KOLLYWOOD_POSTGRES_USER:-kollywood}
      POSTGRES_PASSWORD: ${KOLLYWOOD_POSTGRES_PASSWORD:?KOLLYWOOD_POSTGRES_PASSWORD is required}
    volumes:
      - ${KOLLYWOOD_POSTGRES_DATA_DIR:?KOLLYWOOD_POSTGRES_DATA_DIR is required}:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 12
